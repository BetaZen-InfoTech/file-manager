# File Manager SaaS — Nginx reverse proxy config
#
# Place this file at /etc/nginx/sites-available/filemanager and symlink to
# /etc/nginx/sites-enabled/. Then run:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d files.yourdomain.com
#
# IMPORTANT: client_max_body_size must match MAX_UPLOAD_BYTES in .env

server {
    listen 80;
    server_name files.yourdomain.com;

    # Large uploads — match .env MAX_UPLOAD_BYTES (500 MB default)
    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Security
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Static service worker — must not be cached
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=300";
        add_header Content-Type "application/manifest+json";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
