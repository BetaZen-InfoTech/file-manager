services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-fmsuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-strongpass}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 5s
      retries: 5

# Storage is on the local filesystem (STORAGE_DRIVER=disk) — no MinIO/S3 needed.
# To use S3/MinIO instead, set STORAGE_DRIVER=s3 in .env and run your own store.

volumes:
  mongo_data: {}
